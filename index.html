<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EduSnake World" />
  <meta name="description" content="EduSnake World - Learn alphabets, Hindi letters, numbers and words while playing snake!" />

  <!-- Open Graph -->
  <meta property="og:title" content="EduSnake World" />
  <meta property="og:description" content="Educational snake game for kids ages 3-10" />
  <meta property="og:type" content="website" />

  <!-- PWA manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

  <title>EduSnake World 🐍</title>

  <style>
    /* Prevent flash of unstyled content */
    html, body, #root {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #0d0d2e;
      overflow: hidden;
    }
    /* iOS safe areas */
    #root {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run EduSnake World.</noscript>
  <div id="root"></div>

</html>
